<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="auto">
  <!-- Background -->
  <rect width="800" height="280" fill="#f8fafc" rx="12" />
  
  <!-- Upload Trigger -->
  <circle cx="80" cy="140" r="40" fill="#2563eb" />
  <text x="80" y="144" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PDF Upload</text>
  
  <!-- Cloudinary Node -->
  <rect x="200" y="110" width="100" height="60" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
  <text x="250" y="145" fill="#1e293b" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Cloudinary</text>
  
  <!-- FastAPI Worker -->
  <rect x="380" y="110" width="120" height="60" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
  <text x="440" y="145" fill="#1e293b" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">FastAPI Engine</text>
  
  <!-- ChromaDB -->
  <rect x="580" y="60" width="100" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="630" y="95" fill="#1e293b" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Chroma Vector</text>

  <!-- Groq LLM -->
  <rect x="580" y="160" width="100" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="630" y="195" fill="#1e293b" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Groq (Llama)</text>

  <!-- Arrows -->
  <path d="M 120 140 L 200 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 300 140 L 380 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 500 130 L 580 90" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 500 150 L 580 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  
  <!-- Markers for Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
