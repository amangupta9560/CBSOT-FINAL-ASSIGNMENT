<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="auto">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8fafc" rx="12" />
  
  <!-- Nodes / Blocks -->
  <!-- Frontend -->
  <rect x="300" y="30" width="200" height="60" rx="10" fill="#2563eb" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.1))" />
  <text x="400" y="65" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">React Frontend (Vite)</text>
  
  <!-- Express Backend -->
  <rect x="300" y="160" width="200" height="60" rx="10" fill="#0d9488" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.1))" />
  <text x="400" y="195" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Express API Backend</text>
  
  <!-- Python FastAPI Agent service -->
  <rect x="300" y="290" width="200" height="60" rx="10" fill="#7c3aed" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.1))" />
  <text x="400" y="325" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FastAPI Agent Service</text>
  
  <!-- MongoDB Atlas -->
  <rect x="40" y="160" width="160" height="60" rx="10" fill="#15803d" />
  <text x="120" y="195" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">MongoDB Atlas</text>
  
  <!-- Cloudinary -->
  <rect x="600" y="160" width="160" height="60" rx="10" fill="#ea580c" />
  <text x="680" y="195" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Cloudinary Storage</text>
  
  <!-- ChromaDB -->
  <rect x="40" y="290" width="160" height="60" rx="10" fill="#0f172a" />
  <text x="120" y="325" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Chroma Vector DB</text>
  
  <!-- Groq API -->
  <rect x="600" y="290" width="160" height="60" rx="10" fill="#db2777" />
  <text x="680" y="325" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Groq LLM Engine</text>
  
  <!-- Lines & Arrows -->
  <!-- FE to BE -->
  <path d="M 400 90 L 400 160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 400 160 L 400 90" stroke="#64748b" stroke-width="2" fill="none" />
  
  <!-- BE to Agent Service -->
  <path d="M 400 220 L 400 290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 400 290 L 400 220" stroke="#64748b" stroke-width="2" fill="none" />
  
  <!-- BE to Mongo -->
  <path d="M 300 190 L 200 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <!-- BE to Cloudinary -->
  <path d="M 500 190 L 600 190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  
  <!-- Agent Service to Chroma -->
  <path d="M 300 320 L 200 320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <!-- Agent Service to Groq -->
  <path d="M 500 320 L 600 320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  
  <!-- Markers for Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
