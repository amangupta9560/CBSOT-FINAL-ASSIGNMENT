<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <!-- Background -->
  <rect width="800" height="240" fill="#f8fafc" rx="12" />
  
  <!-- Step 1 -->
  <rect x="30" y="90" width="130" height="60" rx="30" fill="#3b82f6" />
  <text x="95" y="125" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">1. Register/Verify</text>
  
  <!-- Step 2 -->
  <rect x="220" y="90" width="130" height="60" rx="10" fill="#6366f1" />
  <text x="285" y="125" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">2. Upload Paper PDF</text>
  
  <!-- Step 3 -->
  <rect x="410" y="90" width="130" height="60" rx="10" fill="#8b5cf6" />
  <text x="475" y="125" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3. View Library</text>
  
  <!-- Step 4 -->
  <rect x="600" y="90" width="170" height="60" rx="30" fill="#ec4899" />
  <text x="685" y="125" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">4. Interact (Chat/Study/Lit)</text>

  <!-- Connections -->
  <path d="M 160 120 L 220 120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 350 120 L 410 120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 540 120 L 600 120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  
  <!-- Markers for Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
